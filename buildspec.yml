version: 0.2

env:
  variables:
    IMAGE_NAME: "clima-estados-app"

phases:
  install:
    commands:
      - echo "=== INSTALL ==="
      - mkdir -p dist logs
      - |
        printenv | sort > logs/codebuild-env.log

  pre_build:
    commands:
      - echo "=== PRE_BUILD ==="
      - |
        echo "Build ID: $CODEBUILD_BUILD_ID" | tee -a logs/pipeline.log
      - |
        echo "Source version: $CODEBUILD_SOURCE_VERSION" | tee -a logs/pipeline.log
      - docker --version
      - aws --version

  build:
    commands:
      - echo "=== BUILD ==="
      - docker build -t $IMAGE_NAME .
      - |
        echo "Resolved source version: ${CODEBUILD_RESOLVED_SOURCE_VERSION:-N/A}" | tee -a logs/pipeline.log
        if [ -z "${AWS_ACCESS_KEY_ID:-}" ] || [ -z "${AWS_SECRET_ACCESS_KEY:-}" ] || [ -z "${AWS_SESSION_TOKEN:-}" ]; then
          if [ -n "${AWS_CONTAINER_CREDENTIALS_RELATIVE_URI:-}" ]; then
            CREDS_URL="http://169.254.170.2${AWS_CONTAINER_CREDENTIALS_RELATIVE_URI}"
            CREDS_HTTP_CODE="$(curl -sS -o /dev/null -w "%{http_code}" "$CREDS_URL" || echo "000")"
            if [ "$CREDS_HTTP_CODE" != "200" ]; then
              echo "ERROR: No se pudieron obtener credenciales por metadata (HTTP $CREDS_HTTP_CODE) desde AWS_CONTAINER_CREDENTIALS_RELATIVE_URI." | tee -a logs/pipeline.log
              CREDS_JSON=""
            else
              CREDS_JSON="$(curl -sS "$CREDS_URL")"
            fi
          elif [ -n "${AWS_CONTAINER_CREDENTIALS_FULL_URI:-}" ]; then
            CREDS_URL="${AWS_CONTAINER_CREDENTIALS_FULL_URI}"
            CREDS_HTTP_CODE="$(curl -sS -o /dev/null -w "%{http_code}" -H "Authorization: ${AWS_CONTAINER_AUTHORIZATION_TOKEN:-}" "$CREDS_URL" || echo "000")"
            if [ "$CREDS_HTTP_CODE" != "200" ]; then
              echo "ERROR: No se pudieron obtener credenciales por metadata (HTTP $CREDS_HTTP_CODE) desde AWS_CONTAINER_CREDENTIALS_FULL_URI." | tee -a logs/pipeline.log
              CREDS_JSON=""
            else
              CREDS_JSON="$(curl -sS -H "Authorization: ${AWS_CONTAINER_AUTHORIZATION_TOKEN:-}" "$CREDS_URL")"
            fi
          else
            CREDS_JSON=""
          fi

          if [ -n "$CREDS_JSON" ]; then
            export CREDS_JSON
            export AWS_ACCESS_KEY_ID="$(python3 -c 'import json,os; print(json.loads(os.environ["CREDS_JSON"]).get("AccessKeyId",""))')"
            export AWS_SECRET_ACCESS_KEY="$(python3 -c 'import json,os; print(json.loads(os.environ["CREDS_JSON"]).get("SecretAccessKey",""))')"
            export AWS_SESSION_TOKEN="$(python3 -c 'import json,os; print(json.loads(os.environ["CREDS_JSON"]).get("Token",""))')"
          fi
        fi

        if [ -z "${AWS_ACCESS_KEY_ID:-}" ] || [ -z "${AWS_SECRET_ACCESS_KEY:-}" ] || [ -z "${AWS_SESSION_TOKEN:-}" ]; then
          echo "ERROR: No se detectaron credenciales AWS en el entorno de CodeBuild para ejecutar el contenedor." | tee -a logs/pipeline.log
          exit 1
        fi

        docker run --rm \
          -e DDB_TABLE_NAME \
          -e AWS_REGION \
          -e AWS_DEFAULT_REGION \
          -e AWS_CONTAINER_CREDENTIALS_RELATIVE_URI \
          -e AWS_CONTAINER_CREDENTIALS_FULL_URI \
          -e AWS_CONTAINER_AUTHORIZATION_TOKEN \
          -e AWS_ACCESS_KEY_ID \
          -e AWS_SECRET_ACCESS_KEY \
          -e AWS_SESSION_TOKEN \
          -v "$PWD/dist:/app/dist" \
          -v "$PWD/logs:/app/logs" \
          -v "$PWD/data:/app/data" \
          $IMAGE_NAME
      - ls -R dist
      - ls -R logs

  post_build:
    commands:
      - echo "=== POST_BUILD ==="
      - date | tee -a logs/pipeline.log
      - |
        if [ "${CODEBUILD_BUILD_SUCCEEDING}" = "0" ]; then STATUS="FAILED"; else STATUS="SUCCESS"; fi
        printf '{"build_id":"%s","status":"%s"}\n' "$CODEBUILD_BUILD_ID" "$STATUS" > logs/build-summary.json

artifacts:
  files:
    - dist/**/*
    - logs/**/*
  discard-paths: no
